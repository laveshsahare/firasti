spring.application.name=Romify
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jackson.mapper.accept-case-insensitive-enums=true
server.error.include-message=always

app.jwt.secret=romify-super-secret-key-change-me-please
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,https://romify-travel-and-tours.vercel.app}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
app.frontend.base-url=${FRONTEND_BASE_URL:https://romify-travel-and-tours.vercel.app}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

app.cashfree.client-id=${CASHFREE_CLIENT_ID:}
app.cashfree.client-secret=${CASHFREE_CLIENT_SECRET:}
app.cashfree.mode=${CASHFREE_MODE:sandbox}
app.cashfree.api-version=${CASHFREE_API_VERSION:2023-08-01}
